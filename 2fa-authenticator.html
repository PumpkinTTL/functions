<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA 验证器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4">
                <div class="text-center mb-4">
                    <div class="bg-orange-500 rounded-xl w-10 h-10 mx-auto flex items-center justify-center mb-2">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <h1 class="text-lg font-semibold text-gray-900 mb-1">2FA 验证器</h1>
                    <div class="flex items-center justify-center gap-2">
                        <div class="w-4 h-px bg-orange-300"></div>
                        <span class="text-xs text-gray-500">双因素认证</span>
                        <div class="w-4 h-px bg-orange-300"></div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                        <div class="w-6 h-6 bg-orange-100 rounded-lg flex items-center justify-center mb-1">
                            <svg class="w-3 h-3 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <span class="text-[10px] text-gray-600 text-center">HMAC-SHA1</span>
                    </div>
                    
                    <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                        <div class="w-6 h-6 bg-orange-100 rounded-lg flex items-center justify-center mb-1">
                            <svg class="w-3 h-3 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <span class="text-[10px] text-gray-600 text-center">30秒刷新</span>
                    </div>
                    
                    <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                        <div class="w-6 h-6 bg-orange-100 rounded-lg flex items-center justify-center mb-1">
                            <svg class="w-3 h-3 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <span class="text-[10px] text-gray-600 text-center">离线安全</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="secretInput"
                            placeholder="请输入恢复密钥 (Base32)"
                            class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors"
                        >
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-gray-300 transition-colors" id="statusDot"></div>
                    </div>

                    <button 
                        id="generateBtn"
                        onclick="generateCode()"
                        class="w-full py-2 bg-orange-500 text-white text-sm font-medium rounded-lg hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-colors flex items-center justify-center gap-2"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        生成验证码
                    </button>

                    <div id="resultSection" class="hidden">
                        <div class="bg-gray-50 rounded-xl p-3 border border-gray-200">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-1.5">
                                    <div class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></div>
                                    <span class="text-xs text-gray-600">剩余时间</span>
                                </div>
                                <div class="relative w-6 h-6">
                                    <svg class="w-full h-full" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="45" fill="none" stroke="#E5E7EB" stroke-width="10"/>
                                        <circle id="countdownCircle" cx="50" cy="50" r="45" fill="none" stroke="#F97316" stroke-width="10" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
                                    </svg>
                                    <span id="countdownText" class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-gray-700">30</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <div class="flex-1 bg-white rounded-lg border border-gray-200">
                                    <div id="codeDisplay" class="text-2xl font-bold text-center tracking-widest text-gray-900 py-2">
                                        ------
                                    </div>
                                </div>
                                <button 
                                    onclick="copyCode()"
                                    class="p-2 bg-white border border-gray-200 hover:border-orange-300 rounded-lg transition-colors"
                                    title="复制验证码"
                                >
                                    <svg id="copyIcon" class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                    </svg>
                                    <svg id="checkIcon" class="w-4 h-4 text-orange-600 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-4 pb-4 border-t border-gray-100">
                <div class="pt-3">
                    <div class="text-center mb-2">
                        <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-gray-50 rounded-full">
                            <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                            <span class="text-xs text-gray-600">兼容所有 TOTP 验证器</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">Google</span>
                        </div>
                        
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#2BAAE2" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">Microsoft</span>
                        </div>
                        
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#000" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">Authy</span>
                        </div>
                        
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#FF6B35" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">Bitwarden</span>
                        </div>
                        
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#00D4AA" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">LastPass</span>
                        </div>
                        
                        <div class="flex flex-col items-center p-2 bg-gray-50 rounded-lg">
                            <div class="w-6 h-6 bg-white rounded-lg flex items-center justify-center shadow-sm">
                                <svg class="w-3 h-3" viewBox="0 0 24 24">
                                    <path fill="#5865F2" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] text-gray-600 mt-1">1Password</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-4 pb-3">
                <div class="flex items-center justify-between text-[10px] text-gray-400">
                    <div class="flex items-center gap-1">
                        <span class="px-1.5 py-0.5 bg-gray-100 rounded text-gray-500">RFC 6238</span>
                        <span class="px-1.5 py-0.5 bg-gray-100 rounded text-gray-500">TOTP</span>
                    </div>
                    <span>v1.0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let countdownInterval = null;
        let currentSecret = '';

        const base32Chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

        function base32Decode(str) {
            str = str.toUpperCase().replace(/[^A-Z2-7]/g, '');
            let bits = '';
            for (let i = 0; i < str.length; i++) {
                const val = base32Chars.indexOf(str[i]);
                if (val === -1) continue;
                bits += val.toString(2).padStart(5, '0');
            }
            const bytes = new Uint8Array(Math.floor(bits.length / 8));
            for (let i = 0; i < bytes.length; i++) {
                bytes[i] = parseInt(bits.substr(i * 8, 8), 2);
            }
            return bytes;
        }

        async function hmacSha1(key, message) {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        }

        function generateTOTP(secret, timeStep = 30) {
            const time = Math.floor(Date.now() / 1000);
            const counter = Math.floor(time / timeStep);
            
            const counterBytes = new ArrayBuffer(8);
            const counterView = new DataView(counterBytes);
            counterView.setUint32(4, counter, false);
            
            const keyBytes = base32Decode(secret);
            const hmac = hmacSha1(keyBytes, new Uint8Array(counterView.buffer));
            
            return hmac.then(hmacBytes => {
                const offset = hmacBytes[hmacBytes.length - 1] & 0x0f;
                const code = ((hmacBytes[offset] & 0x7f) << 24 |
                             (hmacBytes[offset + 1] & 0xff) << 16 |
                             (hmacBytes[offset + 2] & 0xff) << 8 |
                             (hmacBytes[offset + 3] & 0xff)) % 1000000;
                
                return code.toString().padStart(6, '0');
            });
        }

        function updateCountdown() {
            const now = Date.now();
            const timeStep = 30000;
            const elapsed = now % timeStep;
            const remaining = Math.ceil((timeStep - elapsed) / 1000);
            
            const countdownText = document.getElementById('countdownText');
            const countdownCircle = document.getElementById('countdownCircle');
            
            countdownText.textContent = remaining;
            
            const progress = (elapsed / timeStep) * 283;
            countdownCircle.style.strokeDashoffset = progress;
        }

        async function generateCode() {
            const secretInput = document.getElementById('secretInput');
            const secret = secretInput.value.trim();
            const statusDot = document.getElementById('statusDot');
            
            if (!secret) {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                const resultSection = document.getElementById('resultSection');
                resultSection.classList.add('hidden');
                statusDot.className = 'absolute right-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-gray-300 transition-colors';
                return;
            }
            
            currentSecret = secret;
            statusDot.className = 'absolute right-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-orange-500 transition-colors';
            
            const resultSection = document.getElementById('resultSection');
            const codeDisplay = document.getElementById('codeDisplay');
            
            try {
                const code = await generateTOTP(secret);
                codeDisplay.textContent = code.match(/.{1,3}/g).join(' ');
                resultSection.classList.remove('hidden');
                
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                }
                
                updateCountdown();
                countdownInterval = setInterval(() => {
                    updateCountdown();
                    generateCode().then(code => {
                        codeDisplay.textContent = code.match(/.{1,3}/g).join(' ');
                    });
                }, 1000);
                
            } catch (error) {
                alert('生成验证码失败: ' + error.message);
                statusDot.className = 'absolute right-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-red-500 transition-colors';
            }
        }

        function copyCode() {
            const codeDisplay = document.getElementById('codeDisplay');
            const code = codeDisplay.textContent.replace(/\s/g, '');
            
            navigator.clipboard.writeText(code).then(() => {
                const copyIcon = document.getElementById('copyIcon');
                const checkIcon = document.getElementById('checkIcon');
                
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                
                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                }, 2000);
            });
        }

        document.getElementById('secretInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateCode();
            }
        });
    </script>
</body>
</html>
